name: 'VS Marketplace'
description: 'Publish Visual Studio extension to the Visual Studio Marketplace'
author: 'Jesse Houwing'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  operation:
    description: 'Operation to perform: publish or package'
    required: false
    default: 'publish'

  auth-type:
    description: 'Authentication type (pat or oidc)'
    required: false
    default: 'pat'

  token:
    description: 'Personal Access Token for Visual Studio Marketplace (required when auth-type is pat)'
    required: false

  vsix-file:
    description: 'Path to the VSIX file to publish'
    required: true

  manifest-file:
    description: 'Path to the publish manifest file'
    required: true

  publisher-id:
    description: 'Publisher ID for the extension'
    required: true

  ignore-warnings:
    description: 'Comma or newline-separated list of warnings to ignore (e.g., VSIXValidatorWarning01,VSIXValidatorWarning02)'
    required: false

  vsix-manifest:
    description: 'Path to the .vsixmanifest file (required when operation is package)'
    required: false

  output-path:
    description: 'Output path (directory or full .vsix path) for the packaged extension (required when operation is package)'
    required: false

  content-dir:
    description: 'Optional content directory for packaging. If omitted, the manifest directory is used.'
    required: false

outputs:
  vsix-file:
    description: 'Full path to the packaged .vsix file (set when operation is package)'

runs:
  using: 'node20'
  main: 'dist/bundle.js'
