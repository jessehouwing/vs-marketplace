name: 'VS Marketplace'
description: 'Publish Visual Studio extension to the Visual Studio Marketplace'
author: 'Jesse Houwing'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  operation:
    description: 'Operation to perform: publish or package'
    required: false
    default: 'publish'

  auth-type:
    description: 'Authentication type (pat or oidc)'
    required: false
    default: 'pat'

  token:
    description: 'Personal Access Token for Visual Studio Marketplace (required when auth-type is pat)'
    required: false

  vsix-file:
    description: 'Path to the VSIX file to publish (required when operation is publish)'
    required: false

  manifest-file:
    description: 'Path to the publish manifest file (required when operation is publish)'
    required: false

  publisher-id:
    description: 'Publisher ID for the extension (required when operation is publish)'
    required: false

  ignore-warnings:
    description: 'Comma or newline-separated list of warnings to ignore (e.g., VSIXValidatorWarning01,VSIXValidatorWarning02)'
    required: false

  vsix-manifest:
    description: 'Path to the .vsixmanifest file (required when operation is package)'
    required: false

  output-path:
    description: 'Output path (directory or full .vsix path) for the packaged extension (required when operation is package)'
    required: false

  files-manifest:
    description: 'Path to the files.json manifest listing extension content files for packaging. Generated by the MSBuild GenerateFileManifest target (dotnet msbuild -t:GenerateFileManifest). If omitted, the tool uses the files referenced by the VSIX manifest.'
    required: false

  working-directory:
    description: |-
      Working directory used as the base path for manifest-based operations.

      - Manifest discovery and file paths are resolved from this directory
      - Use this when your extension manifest lives in a subfolder
      - If not specified, the current working directory is used

      Example: tests/sample-extension
    required: false

outputs:
  vsix-file:
    description: 'Full path to the packaged .vsix file (set when operation is package)'

runs:
  using: 'node20'
  main: 'packages/github-action/dist/bundle.js'
